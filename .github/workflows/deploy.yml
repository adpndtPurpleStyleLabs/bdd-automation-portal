name: Test, Upload Artifact

on:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build, Package and Push Docker Image
    runs-on:
      - self-hosted
      - label-1

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build, Package and Push
        shell: bash
        run: |
          set -e

          REV=$(git rev-parse --short HEAD)
          echo "Revision: ${REV}"

          mvn clean package -DskipTests

          docker build \
            --build-arg GIT_COMMIT=${REV} \
            -t open-source-test-automation/t:latest \
            -f Dockerfile .

          docker tag open-source-test-automation/t:latest \
            nexus.ppustage.dev/open-source-test-automation-service:${REV}

          docker tag open-source-test-automation/t:latest \
            nexus.ppustage.dev/open-source-test-automation-service:latest

          echo "${{ secrets.NEXUS_PASSWORD }}" | docker login \
            nexus.ppustage.dev \
            --username "${{ secrets.NEXUS_USER_NAME }}" \
            --password-stdin

          docker push nexus.ppustage.dev/open-source-test-automation-service:${REV}
          docker push nexus.ppustage.dev/open-source-test-automation-service:latest

          docker logout nexus.ppustage.dev