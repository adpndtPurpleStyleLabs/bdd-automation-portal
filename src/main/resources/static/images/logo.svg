<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="100%" height="100%">
  <!-- Logo Mark (Left Side) -->
  <g fill="#65519f">
    <!-- Row 1: Top single bar -->
    <rect x="55" y="20" width="50" height="14" rx="7" />

    <!-- Row 2: Two split bars -->
    <rect x="38" y="41" width="34" height="14" rx="7" />
    <rect x="78" y="41" width="44" height="14" rx="7" />

    <!-- Row 3: Center wide split bars -->
    <rect x="30" y="62" width="58" height="14" rx="7" />
    <rect x="94" y="62" width="36" height="14" rx="7" />

    <!-- Row 4: Two split bars -->
    <rect x="38" y="83" width="44" height="14" rx="7" />
    <rect x="88" y="83" width="34" height="14" rx="7" />

    <!-- Row 5: Bottom single bar -->
    <rect x="55" y="104" width="50" height="14" rx="7" />
  </g>

  <!-- Product Name & Tagline (Right Side) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Product Name -->
    <text x="160" y="68">
      <tspan font-weight="800" font-size="40" fill="#2d2d3a">Scenario</tspan>
      <tspan font-weight="500" font-size="40" fill="#65519f">Hub</tspan>
    </text>

    <!-- Subtitle / Tagline -->
    <text x="162" y="100" font-size="14" font-weight="600" fill="#71717a" letter-spacing="1.5">
      A E2E TEST PROJECT
    </text>
  </g>
</svg>
