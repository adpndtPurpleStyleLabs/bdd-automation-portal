server:
  port: 8080

spring:
  datasource:
    url: ${JDBC_URL}
    username: ${JDBC_USERNAME}
    password:  ${JDBC_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  mvc:
    hiddenmethod:
      filter:
        enabled: true

  thymeleaf:
    cache: false
    mode: HTML

bdd:
  portal:
    features-path: ${BDD_PORTAL_FEATURES_PATH:src/test/resources/features}
    reports-path: target/allure-results
    selenium-grid-url: ${GRID_URL:http://141.94.137.133:5503/wd/hub}
    screenshots-path: bdd-reports/screenshots

vnc:
  public:
    base-url: ${VNC_PUBLIC_BASE_URL:http://localhost:7900}

logging:
  level:
    com.bdd.portal: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO

test:
  environment: dev