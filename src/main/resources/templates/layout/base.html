<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Automation Portal">Automation Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-brand">
                <i class="bi bi-robot brand-icon"></i> 
                <span class="brand-text">Test Automation<br>Framework</span>
            </div>
            
            <div class="sidebar-nav" id="sidebar-nav">
                
                <a th:href="@{/}" class="sidebar-link" data-path="/">
                    <i class="bi bi-house"></i> Dashboard
                </a>
                
                <div class="sidebar-section-title">EXECUTION</div>
                <a th:href="@{/executions}" class="sidebar-link" data-path="/executions">
                    <i class="bi bi-play-btn"></i> Executions
                </a>
<!--                <a href="#" class="sidebar-link">-->
<!--                    <i class="bi bi-play-circle"></i> Triggers-->
<!--                </a>-->
                <a href="#" class="sidebar-link">
                    <i class="bi bi-calendar-event"></i> Schedule Runs
                </a>
                
                <div class="sidebar-section-title">TEST MANAGEMENT</div>
                <a th:href="@{/features}" class="sidebar-link" data-path="/features">
                    <i class="bi bi-folder2"></i> Test Suites
                </a>
<!--                <a href="#" class="sidebar-link">-->
<!--                    <i class="bi bi-file-earmark-code"></i> Features-->
<!--                </a>-->
<!--                <a href="#" class="sidebar-link">-->
<!--                    <i class="bi bi-list-check"></i> Scenarios-->
<!--                </a>-->
<!--                <a href="#" class="sidebar-link">-->
<!--                    <i class="bi bi-calendar3-range"></i> Test Data-->
<!--                </a>-->
                
                <div class="sidebar-section-title">CONFIGURATION</div>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-globe"></i> Environments
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-window-desktop"></i> Browsers
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-people"></i> Users
                </a>
                <a th:href="@{/settings}" class="sidebar-link" data-path="/settings">
                    <i class="bi bi-gear"></i> Settings
                </a>
                
                <div class="sidebar-section-title">REPORTS</div>
                <a th:href="@{/reports}" class="sidebar-link" data-path="/reports">
                    <i class="bi bi-clock-history"></i> Execution History
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-graph-up"></i> Trend Analysis
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-file-earmark-text"></i> Logs
                </a>

            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <!-- Top Header -->
            <nav class="navbar navbar-expand-lg border-bottom px-4">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle"><i class="bi bi-list"></i></button>
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <i class="bi bi-person-circle"></i> <span th:text="${#authentication.name}">User</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <a class="dropdown-item" href="#">Profile</a>
                                <div class="dropdown-divider"></div>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item">Logout</button>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <div class="container-fluid p-2">
                <div layout:fragment="content"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/main.js"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
