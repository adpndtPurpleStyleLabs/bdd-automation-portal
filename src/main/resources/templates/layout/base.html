<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- CSRF Tokens -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title layout:title-pattern="$CONTENT_TITLE - Automation Portal">Automation Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Tagify CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet" type="text/css" />
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-brand text-center py-2">
                <img src="/images/logo.svg" alt="Scenario Hub Logo" style="max-width: 180px; height: auto;" />
            </div>

            <div class="sidebar-nav" id="sidebar-nav">

                <a th:href="@{/}" class="sidebar-link" data-path="/">
                    <i class="bi bi-house"></i> Dashboard
                </a>

                <div class="sidebar-section-title">EXECUTIONS</div>
                <a th:href="@{/executions}" class="sidebar-link" data-path="/executions">
                    <i class="bi bi-play-btn"></i> All Executions
                </a>
                <a th:href="@{/executions(type='MANUAL')}" class="sidebar-link">
                    <i class="bi bi-play-circle"></i> Manual Triggers
                </a>
                <a th:href="@{/executions(type='SCHEDULED')}" class="sidebar-link">
                    <i class="bi bi-calendar-event"></i> Scheduled Runs
                </a>

                <div class="sidebar-section-title">TEST MANAGEMENT</div>
                <a th:href="@{/features}" class="sidebar-link" data-path="/features">
                    <i class="bi bi-folder2"></i> Test Suites
                </a>

                <div class="sidebar-section-title">CONFIGURATION</div>
                <a th:href="@{/config/environments}" class="sidebar-link" data-path="/config/environments">
                    <i class="bi bi-globe"></i> Environments
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-window-desktop"></i> Browsers
                </a>

                <a th:href="@{/settings}" class="sidebar-link" data-path="/settings">
                    <i class="bi bi-gear"></i> Settings
                </a>

            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <!-- Top Header -->
            <nav class="navbar navbar-expand-lg border-bottom px-4">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle"><i class="bi bi-list"></i></button>
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button"
                                data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <i class="bi bi-person-circle"></i> <span th:text="${#authentication.name}">User</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <a class="dropdown-item" th:href="@{/profile}">Profile</a>
                                <a class="dropdown-item" th:href="@{/admin/users}" sec:authorize="hasRole('ADMIN')">User
                                    Management</a>
                                <a class="dropdown-item" th:href="@{/settings}">Settings</a>
                                <div class="dropdown-divider"></div>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item">Logout</button>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <div class="container-fluid p-2">
                <div layout:fragment="content"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
        <div th:if="${successMessage}" id="successToast" class="toast align-items-center text-white bg-success border-0"
            role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMessage}">Success!</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Tagify JS -->
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
    <!-- Custom JS -->
    <script src="/js/main.js"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            var successToastEl = document.getElementById('successToast');
            if (successToastEl) {
                var toast = new bootstrap.Toast(successToastEl, { delay: 4000 });
                toast.show();
            }
        });
    </script>
    <th:block layout:fragment="scripts"></th:block>
</body>

</html>
