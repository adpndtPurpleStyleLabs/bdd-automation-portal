<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - BDD Portal">BDD Automation Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading border-bottom border-secondary text-center py-4">
                <h4><i class="bi bi-robot"></i> BDD Portal</h4>
            </div>
            <div class="list-group list-group-flush mt-3">
                <a th:href="@{/}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="bi bi-house-door me-2"></i>Dashboard
                </a>
                <a th:href="@{/executions}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="bi bi-play-circle me-2"></i>Running Tests
                </a>
                <a th:href="@{/reports}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="bi bi-bar-chart me-2"></i>Reports
                </a>
                <a th:href="@{/features}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="bi bi-folder2-open me-2"></i>Feature Explorer
                </a>
                <a th:href="@{/settings}" class="list-group-item list-group-item-action bg-dark text-white">
                    <i class="bi bi-gear me-2"></i>Settings
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="w-100">
            <!-- Top Header -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-4">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle"><i class="bi bi-list"></i></button>
                    <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <i class="bi bi-person-circle"></i> <span th:text="${#authentication.name}">User</span>
                            </a>
                            <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                <a class="dropdown-item" href="#">Profile</a>
                                <div class="dropdown-divider"></div>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item">Logout</button>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content Area -->
            <div class="container-fluid p-4">
                <div layout:fragment="content"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/main.js"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
