<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Execution Details</title>
</head>
<body>
    <div layout:fragment="content">
        <input type="hidden" id="executionId" th:value="${execution.id}">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Execution #<span th:text="${execution.id}"></span></h2>
            <span id="statusBadge" class="badge fs-5" 
                  th:classappend="${execution.status.name() == 'PASSED' ? 'bg-success' : (execution.status.name() == 'FAILED' ? 'bg-danger' : (execution.status.name() == 'RUNNING' ? 'bg-primary progress-bar-striped progress-bar-animated' : 'bg-secondary'))}"
                  th:text="${execution.status}">STATUS</span>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Execution Info</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless table-sm">
                            <tr>
                                <th>Target:</th>
                                <td th:text="${execution.featureFile != null ? execution.featureFile.name : execution.targetFolder}">Feature</td>
                            </tr>
                            <tr>
                                <th>Browser:</th>
                                <td th:text="${execution.browser}">Chrome</td>
                            </tr>
                            <tr>
                                <th>Environment:</th>
                                <td th:text="${execution.environment}">QA</td>
                            </tr>
                            <tr>
                                <th>Started:</th>
                                <td th:text="${#temporals.format(execution.startTime, 'yyyy-MM-dd HH:mm:ss')}">Time</td>
                            </tr>
                            <tr>
                                <th>Duration:</th>
                                <td th:text="${execution.durationMs != null ? execution.durationMs / 1000 + 's' : '-'}">0s</td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Results Summary</h5>
                    </div>
                    <div class="card-body d-flex justify-content-around align-items-center">
                        <div class="text-center">
                            <h3 class="text-success" th:text="${execution.passedScenarios}">0</h3>
                            <span>Passed</span>
                        </div>
                        <div class="text-center">
                            <h3 class="text-danger" th:text="${execution.failedScenarios}">0</h3>
                            <span>Failed</span>
                        </div>
                        <div class="text-center">
                            <h3 class="text-secondary" th:text="${execution.skippedScenarios}">0</h3>
                            <span>Skipped</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Live Logs View -->
        <div class="card shadow-sm border-dark">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-terminal"></i> Live Execution Logs</h5>
                <div class="spinner-grow spinner-grow-sm text-success" role="status" id="liveIndicator" th:style="${execution.status.name() == 'RUNNING' ? 'display:block;' : 'display:none;'}">
                    <span class="visually-hidden">Running...</span>
                </div>
            </div>
            <div class="card-body bg-black text-light p-0">
                <pre id="logConsole" class="m-0 p-3" style="height: 400px; overflow-y: scroll; font-family: monospace; font-size: 14px;">
<th:block th:each="log : ${execution.logs}">
<span th:class="${log.level == 'ERROR' ? 'text-danger' : (log.level == 'WARN' ? 'text-warning' : 'text-success')}" th:text="|[${#temporals.format(log.timestamp, 'HH:mm:ss')}] [${log.level}] ${log.message}|"></span>
</th:block>
                </pre>
            </div>
        </div>
    </div>
    
    <th:block layout:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
        <script>
            $(document).ready(function() {
                var executionId = $('#executionId').val();
                var status = $('#statusBadge').text().trim();
                
                // Scroll console to bottom initially
                var logConsole = document.getElementById('logConsole');
                logConsole.scrollTop = logConsole.scrollHeight;

                if (status === 'RUNNING' || status === 'QUEUED') {
                    var socket = new SockJS('/ws-stomp');
                    var stompClient = Stomp.over(socket);
                    stompClient.debug = null; // disable debug logs

                    stompClient.connect({}, function (frame) {
                        // Subscribe to logs
                        stompClient.subscribe('/topic/execution/' + executionId + '/logs', function (message) {
                            var logMsg = message.body;
                            var timestamp = new Date().toLocaleTimeString();
                            var colorClass = 'text-success';
                            if(logMsg.includes("ERROR") || logMsg.includes("FAILED")) colorClass = 'text-danger';
                            
                            var logLine = '<span class="' + colorClass + '">[' + timestamp + '] [INFO] ' + escapeHtml(logMsg) + '</span><br>';
                            $('#logConsole').append(logLine);
                            
                            // Auto scroll
                            logConsole.scrollTop = logConsole.scrollHeight;
                        });

                        // Subscribe to status updates
                        stompClient.subscribe('/topic/execution/' + executionId + '/status', function (message) {
                            var newStatus = message.body;
                            var badge = $('#statusBadge');
                            badge.text(newStatus);
                            
                            badge.removeClass('bg-success bg-danger bg-primary bg-secondary progress-bar-striped progress-bar-animated');
                            
                            if (newStatus === 'PASSED') {
                                badge.addClass('bg-success');
                                $('#liveIndicator').hide();
                                setTimeout(function(){ window.location.reload(); }, 2000);
                            } else if (newStatus === 'FAILED') {
                                badge.addClass('bg-danger');
                                $('#liveIndicator').hide();
                                setTimeout(function(){ window.location.reload(); }, 2000);
                            } else if (newStatus === 'RUNNING') {
                                badge.addClass('bg-primary progress-bar-striped progress-bar-animated');
                            } else {
                                badge.addClass('bg-secondary');
                            }
                        });
                    });
                }
                
                function escapeHtml(unsafe) {
                    return unsafe
                         .replace(/&/g, "&amp;")
                         .replace(/</g, "&lt;")
                         .replace(/>/g, "&gt;")
                         .replace(/"/g, "&quot;")
                         .replace(/'/g, "&#039;");
                }
            });
        </script>
    </th:block>
</body>
</html>
