<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Executions</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4">Running Tests</h2>
        
        <!-- Running Executions -->
        <div class="card shadow-sm mb-4 border-primary" th:if="${not #lists.isEmpty(runningExecutions)}">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-activity"></i> Currently Running</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Started</th>
                                <th>Target</th>
                                <th>Browser</th>
                                <th>Environment</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="exec : ${runningExecutions}">
                                <td th:text="${exec.id}">1</td>
                                <td th:text="${#temporals.format(exec.startTime, 'yyyy-MM-dd HH:mm:ss')}">Time</td>
                                <td th:text="${exec.featureFile != null ? exec.featureFile.name : exec.targetFolder}">Feature</td>
                                <td th:text="${exec.browser}">Chrome</td>
                                <td th:text="${exec.environment}">QA</td>
                                <td>
                                    <span class="badge bg-primary progress-bar-striped progress-bar-animated">RUNNING</span>
                                </td>
                                <td>
                                    <a th:href="@{/executions/{id}(id=${exec.id})}" class="btn btn-sm btn-outline-primary">View Live</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <h2 class="mb-4">Execution History</h2>
        <!-- All Executions -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Date</th>
                                <th>Target</th>
                                <th>Browser</th>
                                <th>Duration</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="exec : ${allExecutions}">
                                <td th:text="${exec.id}">1</td>
                                <td th:text="${#temporals.format(exec.startTime, 'yyyy-MM-dd HH:mm:ss')}">Time</td>
                                <td th:text="${exec.featureFile != null ? exec.featureFile.name : exec.targetFolder}">Feature</td>
                                <td th:text="${exec.browser}">Chrome</td>
                                <td th:text="${exec.durationMs != null ? exec.durationMs / 1000 + 's' : '-'}">10s</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${exec.status.name() == 'PASSED' ? 'bg-success' : (exec.status.name() == 'FAILED' ? 'bg-danger' : (exec.status.name() == 'RUNNING' ? 'bg-primary progress-bar-striped progress-bar-animated' : 'bg-secondary'))}"
                                          th:text="${exec.status}">STATUS</span>
                                </td>
                                <td>
                                    <a th:href="@{/executions/{id}(id=${exec.id})}" class="btn btn-sm btn-outline-primary">Details</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
