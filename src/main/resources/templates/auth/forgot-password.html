<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - BDD Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --primary-color: #65519f;
            --primary-hover: #503d82;
        }

        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .auth-card { 
            background-color: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
            margin: 1rem;
        }

        .form-control {
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(101, 81, 159, 0.15);
        }
        
        .input-group-text {
            border: 1px solid #e5e7eb;
            border-right: none;
            background-color: #f9fafb !important;
            color: #6b7280;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(101, 81, 159, 0.25);
        }
        
        a { color: var(--primary-color); }
        a:hover { color: var(--primary-hover); }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.2rem;
            height: 1.2rem;
            top: 50%;
            left: 50%;
            margin-top: -0.6rem;
            margin-left: -0.6rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card auth-card p-4 p-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-key" style="font-size: 3rem; color: var(--primary-color);"></i>
        </div>
        <h3 class="mb-2 text-center fw-bold">Forgot Password</h3>
        <p class="text-muted text-center mb-5">Enter your email address and we'll send you a 6-digit OTP to reset your password.</p>

        <form id="forgotPasswordForm">
            <div id="alertMessage" class="alert d-none border-0"></div>

            <div class="mb-4">
                <label for="email" class="form-label fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required autofocus>
                </div>
            </div>

            <button class="btn btn-primary w-100 py-2 mb-3" type="submit" id="submitBtn">Send OTP</button>
            
            <div class="text-center">
                <a th:href="@{/login}" class="text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const alertMsg = document.getElementById('alertMessage');
            const email = document.getElementById('email').value;
            
            btn.classList.add('btn-loading');
            btn.disabled = true;
            
            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                alertMsg.className = 'alert alert-info d-flex align-items-center mb-4';
                alertMsg.innerHTML = `<i class="bi bi-info-circle-fill me-2"></i> <div>${data.message}</div>`;
                
                // Store email in sessionStorage to use in next step
                sessionStorage.setItem('resetEmail', email);
                
                setTimeout(() => {
                    window.location.href = '/verify-otp';
                }, 2000);
            })
            .catch(error => {
                alertMsg.className = 'alert alert-danger d-flex align-items-center mb-4';
                alertMsg.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> <div>An error occurred.</div>`;
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
