<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - BDD Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --primary-color: #65519f;
            --primary-hover: #503d82;
        }

        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .auth-card { 
            background-color: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
            margin: 1rem;
        }

        .form-control {
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(101, 81, 159, 0.15);
        }
        
        .input-group-text {
            border: 1px solid #e5e7eb;
            border-right: none;
            background-color: #f9fafb !important;
            color: #6b7280;
        }
        
        .input-group-text:last-child {
            border: 1px solid #e5e7eb;
            border-left: none;
        }
        
        .form-control {
            border-right: none;
        }
        
        .password-strength-meter {
            height: 4px;
            background-color: #e9ecef;
            border-radius: 2px;
            margin-top: 5px;
        }
        
        .strength-bar {
            height: 100%;
            border-radius: 2px;
            width: 0;
            transition: width 0.3s ease-in-out, background-color 0.3s ease-in-out;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(101, 81, 159, 0.25);
        }
        
        a { color: var(--primary-color); }
        a:hover { color: var(--primary-hover); }

        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.2rem;
            height: 1.2rem;
            top: 50%;
            left: 50%;
            margin-top: -0.6rem;
            margin-left: -0.6rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card auth-card p-4 p-md-5" id="resetCard">
        <div class="text-center mb-4">
            <i class="bi bi-person-lock" style="font-size: 3rem; color: var(--primary-color);"></i>
        </div>
        <h3 class="mb-2 text-center fw-bold">Set New Password</h3>
        <p class="text-muted text-center mb-5">Create a strong password for your account.</p>

        <form id="resetPasswordForm">
            <div id="alertMessage" class="alert d-none border-0"></div>

            <div class="mb-4">
                <label for="newPassword" class="form-label fw-medium">New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                    <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('newPassword', 'icon1')">
                        <i class="bi bi-eye" id="icon1"></i>
                    </span>
                </div>
                <div class="password-strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="form-text mt-2 small" id="strengthText">Password must be at least 8 characters.</div>
            </div>

            <div class="mb-5">
                <label for="confirmPassword" class="form-label fw-medium">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                    <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword('confirmPassword', 'icon2')">
                        <i class="bi bi-eye" id="icon2"></i>
                    </span>
                </div>
            </div>

            <button class="btn btn-primary w-100 py-2" type="submit" id="submitBtn">Update Password</button>
        </form>
    </div>

    <!-- Success Screen (Hidden initially) -->
    <div class="card auth-card p-4 p-md-5 d-none text-center" id="successCard">
        <div class="mb-4">
            <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
        </div>
        <h4 class="mb-3">Password Changed Successfully!</h4>
        <p class="text-muted mb-4">Your password has been updated. You can now log in with your new credentials.</p>
        <a th:href="@{/login}" class="btn btn-primary w-100 py-2">Go to Login</a>
    </div>

    <script>
        const email = sessionStorage.getItem('resetEmail');
        const otp = sessionStorage.getItem('verifiedOtp');
        
        if (!email || !otp) {
            window.location.href = '/forgot-password';
        }

        function togglePassword(inputId, iconId) {
            const pwdInput = document.getElementById(inputId);
            const toggleIcon = document.getElementById(iconId);
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        // Password Strength
        document.getElementById('newPassword').addEventListener('input', function(e) {
            const val = e.target.value;
            let strength = 0;
            if (val.length >= 8) strength += 1;
            if (val.match(/[a-z]/) && val.match(/[A-Z]/)) strength += 1;
            if (val.match(/\d/)) strength += 1;
            if (val.match(/[^a-zA-Z\d]/)) strength += 1;

            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            switch(strength) {
                case 0:
                case 1:
                    bar.style.width = '25%'; bar.style.backgroundColor = '#dc3545';
                    text.innerText = 'Weak'; text.style.color = '#dc3545';
                    break;
                case 2:
                    bar.style.width = '50%'; bar.style.backgroundColor = '#ffc107';
                    text.innerText = 'Fair'; text.style.color = '#ffc107';
                    break;
                case 3:
                    bar.style.width = '75%'; bar.style.backgroundColor = '#0dcaf0';
                    text.innerText = 'Good'; text.style.color = '#0dcaf0';
                    break;
                case 4:
                    bar.style.width = '100%'; bar.style.backgroundColor = '#198754';
                    text.innerText = 'Strong'; text.style.color = '#198754';
                    break;
            }
            if(val.length === 0) {
                bar.style.width = '0';
                text.innerText = 'Password must be at least 8 characters.';
                text.style.color = 'inherit';
            }
        });

        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pwd1 = document.getElementById('newPassword').value;
            const pwd2 = document.getElementById('confirmPassword').value;
            const alertMsg = document.getElementById('alertMessage');
            
            if (pwd1 !== pwd2) {
                alertMsg.className = 'alert alert-danger d-flex align-items-center mb-4';
                alertMsg.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> <div>Passwords do not match.</div>`;
                return;
            }
            
            if (pwd1.length < 8) {
                alertMsg.className = 'alert alert-danger d-flex align-items-center mb-4';
                alertMsg.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> <div>Password must be at least 8 characters.</div>`;
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
            
            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: otp, newPassword: pwd1 })
            })
            .then(res => res.json().then(data => ({status: res.status, body: data})))
            .then(res => {
                if (res.status === 200) {
                    sessionStorage.removeItem('resetEmail');
                    sessionStorage.removeItem('verifiedOtp');
                    
                    document.getElementById('resetCard').classList.add('d-none');
                    document.getElementById('successCard').classList.remove('d-none');
                } else {
                    alertMsg.className = 'alert alert-danger d-flex align-items-center mb-4';
                    alertMsg.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> <div>${res.body.error || 'Failed to reset password'}</div>`;
                    btn.classList.remove('btn-loading');
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
