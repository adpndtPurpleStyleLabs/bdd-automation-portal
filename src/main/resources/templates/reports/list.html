<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Reports</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4">Reports</h2>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead>
                            <tr>
                                <th>Execution ID</th>
                                <th>Date</th>
                                <th>Target</th>
                                <th>Status</th>
                                <th>Passed</th>
                                <th>Failed</th>
                                <th>Skipped</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="exec : ${executions}" th:if="${exec.status.name() == 'PASSED' || exec.status.name() == 'FAILED'}">
                                <td th:text="${exec.id}">1</td>
                                <td th:text="${#temporals.format(exec.endTime, 'yyyy-MM-dd HH:mm:ss')}">Time</td>
                                <td th:text="${exec.featureFile != null ? exec.featureFile.name : exec.targetFolder}">Feature</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${exec.status.name() == 'PASSED' ? 'bg-success' : 'bg-danger'}"
                                          th:text="${exec.status}">STATUS</span>
                                </td>
                                <td class="text-success" th:text="${exec.passedScenarios}">0</td>
                                <td class="text-danger" th:text="${exec.failedScenarios}">0</td>
                                <td class="text-secondary" th:text="${exec.skippedScenarios}">0</td>
                                <td>
                                    <a th:href="@{/reports/detail/{id}(id=${exec.id})}" class="btn btn-sm btn-primary">Details</a>
                                    <a href="#" class="btn btn-sm btn-outline-info ms-1">Allure</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(executions)}">
                                <td colspan="8" class="text-center">No reports available. Run some tests first.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
