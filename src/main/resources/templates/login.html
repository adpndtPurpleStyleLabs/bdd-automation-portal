<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - BDD Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --primary-color: #65519f;
            --primary-hover: #503d82;
        }

        body { 
            background-color: var(--primary-bg); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .login-sidebar {
            background-color: var(--primary-bg);
            background-image: linear-gradient(rgba(101, 81, 159, 0.85), rgba(62, 50, 101, 0.95)), url('/images/login-illustration.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset -10px 0 20px -10px rgba(0,0,0,0.1);
        }

        .login-sidebar h1 {
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            z-index: 1;
        }
        
        .login-sidebar .lead {
            z-index: 1;
            opacity: 0.95;
            font-weight: 400;
            font-size: 1.1rem;
            max-width: 80%;
            line-height: 1.6;
        }
        
        .login-sidebar i {
            z-index: 1;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .login-form-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            width: 100%;
            background-color: var(--primary-bg);
        }

        .login-card { 
            background-color: var(--card-bg);
            max-width: 420px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 20px 48px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .form-control {
            border: 1px solid #e5e7eb;
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(101, 81, 159, 0.15);
        }
        
        .input-group-text {
            border: 1px solid #e5e7eb;
            border-right: none;
            background-color: #f9fafb !important;
            color: #6b7280;
        }
        
        .form-control {
            border-left: none;
        }
        
        .password-toggle {
            border-left: none !important;
            border-right: 1px solid #e5e7eb;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(101, 81, 159, 0.25);
        }
        
        .btn-primary:active,
        .btn-primary:focus {
            background-color: var(--primary-hover) !important;
            border-color: var(--primary-hover) !important;
            box-shadow: 0 0 0 3px rgba(101, 81, 159, 0.25) !important;
        }
        
        .btn-primary:disabled,
        .btn-primary.disabled {
            background-color: rgba(101, 81, 159, 0.65) !important;
            border-color: rgba(101, 81, 159, 0.65) !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        a {
            color: var(--primary-color);
        }
        
        a:hover {
            color: var(--primary-hover);
        }

        .password-toggle {
            cursor: pointer;
        }
        
        /* Spinner */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        .btn-loading::after {
            content: "";
            position: absolute;
            width: 1.2rem;
            height: 1.2rem;
            top: 50%;
            left: 50%;
            margin-top: -0.6rem;
            margin-left: -0.6rem;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0 d-flex flex-grow-1">
        <div class="row w-100 m-0 flex-grow-1">
            <!-- Login Form Area -->
            <div class="col-lg-7 login-form-container">
                <div class="card login-card p-4">
                    <div class="text-center mb-3">
                        <img src="/images/logo.svg" alt="Scenario Hub Logo" style="max-width: 200px; height: auto;" />
                    </div>
                    <form id="loginForm" th:action="@{/login}" method="post">
                        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center border-0 mb-3" style="background-color: #fee2e2; color: #991b1b; padding: 0.5rem 0.75rem;">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div>Invalid credentials or account disabled.</div>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center border-0 mb-3" style="background-color: #d1fae5; color: #065f46; padding: 0.5rem 0.75rem;">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <div>You have been successfully logged out.</div>
                        </div>

                        <div class="mb-4">
                            <label for="username" class="form-label fw-medium" style="color: var(--text-main);">Email / Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control" placeholder="name@company.com" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label for="password" class="form-label fw-medium" style="color: var(--text-main);">Password</label>
                                <a th:href="@{/forgot-password}" class="text-decoration-none small fw-medium">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                                <span class="input-group-text password-toggle bg-transparent" onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-5 form-check">
                            <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                            <label class="form-check-label" for="remember-me" style="color: var(--text-main);">Remember me</label>
                        </div>

                        <button class="btn btn-primary w-100 py-1" type="submit" id="submitBtn">Sign in</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('submitBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;
        });
    </script>
</body>
</html>
