<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4">Dashboard</h2>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card mb-3">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-primary-soft me-3">
                            <i class="bi bi-collection"></i>
                        </div>
                        <div>
                            <h6 class="card-title text-muted mb-1">Total Features</h6>
                            <h3 class="mb-0 text-primary fw-bold" th:text="${totalFeatures}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card mb-3">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-success-soft me-3">
                            <i class="bi bi-play-circle"></i>
                        </div>
                        <div>
                            <h6 class="card-title text-muted mb-1">Total Executions</h6>
                            <h3 class="mb-0 text-success fw-bold" th:text="${totalExecutions}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Recent Executions</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Date</th>
                                <th>Target</th>
                                <th>Browser</th>
                                <th>Status</th>
                                <th>Duration (s)</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="exec : ${recentExecutions}">
                                <td th:text="${exec.id}">1</td>
                                <td th:text="${#temporals.format(exec.startTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01</td>
                                <td th:text="${exec.featureFile != null ? exec.featureFile.name : exec.targetFolder}">Feature</td>
                                <td th:text="${exec.browser}">Chrome</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${exec.status.name() == 'PASSED' ? 'bg-success' : (exec.status.name() == 'FAILED' ? 'bg-danger' : 'bg-warning')}"
                                          th:text="${exec.status}">PASSED</span>
                                </td>
                                <td th:text="${exec.durationMs != null ? exec.durationMs / 1000 : '-'}">10</td>
                                <td>
                                    <a th:href="@{/executions/{id}(id=${exec.id})}" class="btn btn-sm btn-outline-primary">View</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recentExecutions)}">
                                <td colspan="7" class="text-center">No recent executions found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
