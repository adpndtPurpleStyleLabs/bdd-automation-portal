<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Execution Cancelled</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #f39c12; }
        .header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { color: #f39c12; margin: 0; }
        .content { font-size: 16px; line-height: 1.6; }
        .details-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .details-table th, .details-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .details-table th { background-color: #f9fafb; color: #555; width: 40%; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Test Execution Cancelled</h2>
    </div>
    <div class="content">
        <p>Hello,</p>
        <p>The following test execution has been cancelled:</p>
        <table class="details-table">
            <tr>
                <th>Test Suite</th>
                <td th:text="${suiteName}">Suite Name</td>
            </tr>
            <tr>
                <th>Execution ID</th>
                <td th:text="${execution.id}">12345</td>
            </tr>
            <tr>
                <th>Environment</th>
                <td th:text="${execution.environment}">STAGE</td>
            </tr>
            <tr>
                <th>Browser</th>
                <td th:text="${execution.browser}">Chrome</td>
            </tr>
        </table>
        <p>If this was unexpected, please check the system logs or contact the administrator.</p>
    </div>
    <div class="footer">
        <p>&copy; BDD Automation Portal</p>
    </div>
</div>
</body>
</html>
