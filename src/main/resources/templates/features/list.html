<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Features Explorer</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Feature Explorer</h2>
            <form th:action="@{/features/rescan}" method="post">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-arrow-clockwise me-1"></i> Rescan Features
                </button>
            </form>
        </div>

        <div th:each="entry : ${featuresByFolder}" class="card mb-4 shadow-sm">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-folder-fill text-warning me-2"></i> <span th:text="${entry.key}">Folder</span>
                </h5>
                <form th:action="@{/executions/run/folder}" method="post" class="d-inline d-flex align-items-center">
                    <input type="hidden" name="folderPath" th:value="${entry.key}">
                    <select name="environment" class="form-select form-select-sm me-2" style="width: auto;">
                        <option th:each="env : ${environments}" th:value="${env}" th:text="${env}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-success text-nowrap">
                        <i class="bi bi-play-fill"></i> Run Folder
                    </button>
                </form>
            </div>
            <div class="card-body">
                <div class="row">
                    <div th:each="feature : ${entry.value}" class="col-md-4 mb-3">
                        <div class="card h-100 border-info">
                            <div class="card-body">
                                <h6 class="card-title text-info" th:text="${feature.name}">Feature Name</h6>
                                <p class="card-text small text-muted text-truncate" th:text="${feature.description} ?: 'No description'"></p>
                                <div class="mb-2">
                                    <span class="badge bg-secondary me-1" th:text="${feature.scenarioCount} + ' Scenarios'">0 Scenarios</span>
                                    <span th:if="${feature.tags != null}" th:each="tag : ${#strings.arraySplit(feature.tags, ' ')}" class="badge bg-light text-dark border me-1" th:text="${tag}">@Tag</span>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-top-0 d-flex justify-content-between">
                                <a th:href="@{/features/{id}(id=${feature.id})}" class="btn btn-sm btn-outline-primary">Details</a>
                                <form th:action="@{/executions/run/feature/{id}(id=${feature.id})}" method="post" class="d-flex align-items-center">
                                    <select name="environment" class="form-select form-select-sm me-1" style="width: auto;">
                                        <option th:each="env : ${environments}" th:value="${env}" th:text="${env}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-success">
                                        <i class="bi bi-play-fill"></i> Run
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#maps.isEmpty(featuresByFolder)}" class="alert alert-info">
            No features found. Click "Rescan Features" to scan the configured features directory.
        </div>
    </div>
</body>
</html>
