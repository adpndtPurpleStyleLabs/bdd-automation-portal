<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Create Scheduled Job</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 mb-0 text-gray-800"><i class="bi bi-clock-history text-primary me-2"></i>Create Scheduled Job</h2>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <form th:action="@{/jobs/create}" method="post">
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Job Name</label>
                            <input type="text" name="jobName" class="form-control" required placeholder="e.g. Nightly Regression Suite">
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Environment</label>
                            <select name="environment" class="form-select">
                                <option th:each="env : ${environments}" th:value="${env}" th:text="${env}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Browser</label>
                            <select name="browser" class="form-select">
                                <option value="Chrome">Chrome</option>
                                <option value="Firefox">Firefox</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-4 border rounded p-3 bg-light">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Schedule Type</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="scheduleType" id="typeOnce" value="ONCE" checked onchange="toggleScheduleFields()">
                                    <label class="form-check-label" for="typeOnce">Run Once</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="scheduleType" id="typeRecurring" value="RECURRING" onchange="toggleScheduleFields()">
                                    <label class="form-check-label" for="typeRecurring">Recurring (Cron)</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-6" id="onceField">
                            <label class="form-label fw-bold">Scheduled Date & Time</label>
                            <input type="datetime-local" name="scheduledTime" class="form-control">
                        </div>
                        
                        <div class="col-md-6" id="recurringField" style="display: none;">
                            <label class="form-label fw-bold">Cron Expression</label>
                            <input type="text" name="cronExpression" class="form-control" placeholder="0 0 2 * * * (Every day at 2 AM)">
                            <small class="text-muted">Spring Cron format: sec min hour day month dayOfWeek</small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold mb-3">Select Scenarios</label>
                        <div class="accordion" id="featuresAccordion">
                            <th:block th:each="feature, stat : ${features}">
                                <div class="accordion-item mb-2 border rounded">
                                    <h2 class="accordion-header" th:id="'heading' + ${stat.index}">
                                        <button class="accordion-button collapsed py-2" type="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse' + ${stat.index}">
                                            <div class="d-flex align-items-center w-100">
                                                <i class="bi bi-file-earmark-text text-primary me-2"></i>
                                                <span class="fw-medium">[[${feature.name}]]</span>
                                                <span class="badge bg-secondary ms-auto rounded-pill" th:text="${#lists.size(feature.scenarios)} + ' Scenarios'"></span>
                                            </div>
                                        </button>
                                    </h2>
                                    <div th:id="'collapse' + ${stat.index}" class="accordion-collapse collapse" th:data-bs-parent="'#featuresAccordion'">
                                        <div class="accordion-body py-2 bg-light">
                                            <div th:if="${#lists.isEmpty(feature.scenarios)}" class="text-muted small fst-italic">No scenarios available</div>
                                            <div class="form-check mb-1" th:each="scenario : ${feature.scenarios}">
                                                <input class="form-check-input" type="checkbox" name="targetScenarios" th:value="${feature.relativePath + ':' + scenario.lineNumber}" th:id="'scenario' + ${feature.id} + '_' + ${scenario.lineNumber}">
                                                <label class="form-check-label small" th:for="'scenario' + ${feature.id} + '_' + ${scenario.lineNumber}">
                                                    [[${scenario.name}]] <span class="text-muted">(Line [[${scenario.lineNumber}]])</span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </th:block>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-calendar-check me-2"></i>Schedule Job</button>
                        <a th:href="@{/executions(type='SCHEDULED')}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div layout:fragment="scripts">
        <script>
            function toggleScheduleFields() {
                const typeOnce = document.getElementById('typeOnce').checked;
                document.getElementById('onceField').style.display = typeOnce ? 'block' : 'none';
                document.getElementById('recurringField').style.display = typeOnce ? 'none' : 'block';
            }
        </script>
    </div>
</body>
</html>
